<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pack for Lune</title>
  <!-- Rubik:wght@500 added for watermark font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&family=Rubik:wght@500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --sky:        #0d0d1a;
  --sky-mid:    #1a1a2e;
  --indigo:     #2d2b55;
  --lavender:   #a78bfa;
  --soft-pink:  #f9a8d4;
  --moon:       #fef9c3;
  --text-light: #e0d7ff;
  --text-dim:   #a09cbb;
  --btn-bg:     #969eb5;
  --btn-hover:  #6d5cc9;
  --card-bg:    rgba(255,255,255,0.07);
  --border:     rgba(167,139,250,0.3);
  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html { height: 100%; overflow: hidden; }

body {
  width: 100vw; height: 100dvh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  background: var(--sky);
  font-family: 'VT323', monospace;
  color: var(--text-light);
  image-rendering: pixelated;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

.page {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100dvh;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}
.page.active { display: flex; }

/* ── PAGE 1 ── */
#page-intro {
  background: #6b7280; cursor: pointer;
  user-select: none; -webkit-user-select: none;
  justify-content: center; align-items: center;
}
.intro-bg {
  position: absolute; top: 0; left: 0;
  width: 100vw; height: 100dvh;
  object-fit: fill; z-index: 0; image-rendering: pixelated;
}
.intro-dialog {
  position: relative; z-index: 2;
  width: clamp(200px, 60vw, 260px);
  border: 2.5px solid #1a1a1a;
  box-shadow: 2px 2px 0 #ffffff inset, -2px -2px 0 #7a7a8a inset, 4px 4px 0 rgba(0,0,0,0.35);
  background: transparent; image-rendering: pixelated;
}
.dialog-titlebar {
  display: flex; align-items: center; justify-content: space-between;
  background: #8b8fa8;
  box-shadow: inset 1px 1px 0 #b0b4c8, inset -1px -1px 0 #5a5e74;
  padding: 5px 6px 5px 10px; gap: 8px;
}
.dialog-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 2vw, 8px); color: #f0f0f0;
  letter-spacing: 0.5px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.dialog-btns { display: flex; gap: 4px; flex-shrink: 0; }
.dialog-btn {
  display: flex; align-items: center; justify-content: center;
  width: clamp(18px, 5.5vw, 24px); height: clamp(18px, 5.5vw, 24px);
  background: #9b9fb8; border: 1.5px solid #1a1a1a;
  box-shadow: 1px 1px 0 #c8ccdc inset, -1px -1px 0 #5a5e74 inset;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(5px, 1.8vw, 7px); color: #1a1a1a; cursor: pointer; line-height: 1;
}
.dialog-body {
  background: #f0f0ec;
  box-shadow: -1px -1px 0 #ffffff inset, 1px 1px 0 #a0a4b8 inset;
  padding: 14px 14px 18px; min-height: clamp(100px, 22vh, 160px); position: relative;
}
.dialog-text {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 2.2vw, 10px); color: #2a2a3a;
  line-height: 2; display: inline; word-break: break-word;
}
.dialog-cursor {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 2.2vw, 10px); color: #2a2a3a;
  animation: blink 0.8s step-start infinite; display: inline;
}
@keyframes blink { 50% { opacity: 0; } }
.dialog-hint {
  margin-top: clamp(16px, 4vw, 24px);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 1.8vw, 8px); color: #6b6f88;
  text-align: center; animation: fadeIn 0.6s ease forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hidden { display: none !important; }

/* ── BUTTONS ── */
.btn-pixel {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 3vw, 11px); color: #f0f1f5;
  background: var(--btn-bg); border: none;
  padding: clamp(13px, 3.5vw, 16px) clamp(18px, 5vw, 26px);
  cursor: pointer;
  box-shadow: inset -3px -3px 0 #b0b8b0, inset 3px 3px 0 #edf1ef, 0 0 18px rgba(218,223,220,0.3);
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing: 1px; line-height: 1.6; touch-action: manipulation;
}
.btn-pixel:active {
  transform: translateY(2px);
  box-shadow: inset -2px -2px 0 #b0b8b0, inset 2px 2px 0 #edf1ef;
}
.btn-small {
  font-size: clamp(7px, 2.5vw, 10px);
  padding: clamp(10px, 2.5vw, 13px) clamp(13px, 4vw, 18px);
}
.btn-cancel, .btn-secondary {
  background: rgba(255,255,255,0.05);
  box-shadow: inset -3px -3px 0 rgba(0,0,0,0.3), inset 3px 3px 0 rgba(255,255,255,0.1);
  color: var(--text-dim);
}

/* ── PAGE 2 ── */
#page-room { background: #0d0d1a; position: relative; justify-content: center; align-items: center; padding: 0; }
.phone-frame { position: relative; width: 100vw; height: 100dvh; overflow: hidden; }
#room-canvas { display: block; image-rendering: pixelated; width: 100%; height: 100%; touch-action: none; }
.hud {
  position: absolute; top: calc(10px + var(--safe-top)); right: 10px;
  z-index: 10; display: flex; flex-direction: column;
  align-items: flex-end; gap: 4px; max-width: 80%;
}
.hud-items {
  font-family: 'Press Start 2P', monospace; font-size: clamp(7px, 2.8vw, 10px);
  color: var(--moon); background: rgba(13,13,26,0.88);
  padding: 6px 10px; border: 1px solid var(--border);
  backdrop-filter: blur(4px); white-space: nowrap;
}
.hud-hint { font-size: clamp(13px, 4vw, 16px); color: var(--text-dim); padding: 3px 8px; text-align: right; line-height: 1.3; }
.btn-finish {
  position: absolute; bottom: calc(20px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%);
  z-index: 25; white-space: nowrap;
  animation: pulse 2s ease-in-out infinite;
  touch-action: manipulation; pointer-events: all;
}
@keyframes pulse {
  0%, 100% { box-shadow: inset -3px -3px 0 #b0b8b0, inset 3px 3px 0 #edf1ef, 0 0 12px rgba(237,241,239,0.3); }
  50%       { box-shadow: inset -3px -3px 0 #b0b8b0, inset 3px 3px 0 #edf1ef, 0 0 28px rgba(237,241,239,0.7); }
}
.dpad { display: none !important; }
.dpad-btn {
  font-family: 'Press Start 2P', monospace; font-size: clamp(12px, 4vw, 16px);
  background: rgba(76,61,143,0.75); color: var(--moon);
  border: 1px solid var(--border); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; user-select: none; -webkit-user-select: none; cursor: pointer;
}
.dpad-btn:active { background: var(--btn-hover); }
.dpad-up    { grid-column: 2; grid-row: 1; }
.dpad-left  { grid-column: 1; grid-row: 2; }
.dpad-down  { grid-column: 2; grid-row: 3; }
.dpad-right { grid-column: 3; grid-row: 2; }

/* ── POPUP ── */
.item-popup {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  display: flex; justify-content: center;
  background: linear-gradient(to top, rgba(13,13,26,0.95) 60%, transparent);
  padding: 16px 16px calc(16px + var(--safe-bottom));
  animation: slideUp 0.2s ease;
}
.item-popup.hidden { display: none !important; pointer-events: none !important; }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.popup-inner { position: relative; width: 100%; max-width: 400px; }
.popup-frame-img { display: block; width: 100%; height: auto; image-rendering: pixelated; image-rendering: crisp-edges; }
.popup-content {
  position: absolute; top: 12%; left: 8%; right: 8%; bottom: 8%;
  display: flex; flex-direction: column; align-items: center;
  justify-content: space-between; text-align: center; gap: 4px;
}
.popup-icon-wrap {
  position: relative; width: clamp(52px, 16vw, 72px); height: clamp(52px, 16vw, 72px);
  display: flex; align-items: center; justify-content: center;
}
.popup-icon-bg { display: none; }
.popup-icon { position: relative; z-index: 1; font-size: clamp(24px, 8vw, 36px); line-height: 1; }
.popup-name { font-family: 'Press Start 2P', monospace; font-size: clamp(7px, 2.5vw, 10px); color: #55556b; line-height: 1.6; }
.popup-desc { font-size: clamp(13px, 4vw, 17px); color: var(--text-dim); line-height: 1.5; }
.popup-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-ui { background: none; border: none; padding: 0; cursor: pointer; touch-action: manipulation; width: clamp(90px, 28vw, 130px); transition: transform 0.1s, opacity 0.1s; }
.btn-ui img { width: 100%; height: auto; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
.btn-ui:active { transform: translateY(2px); opacity: 0.85; }

/* ── PAGE 2.5 ── */
#page-goodluck {
  background: url('assets/result/background.png') center center / cover no-repeat;
  image-rendering: pixelated;
}

.goodluck-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(16px, 4vh, 32px);
  text-align: center;
  width: 100%;
  height: 100%;
}

.rocket-img {
  width: clamp(100px, 35vw, 180px);
  height: auto;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-18px); }
}

.goodluck-text {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 4vw, 20px);
  color: var(--text-light);
  letter-spacing: 1px;
}

.goodluck-btn {
  white-space: nowrap;
}

/* ── PAGE 3 ── */
#page-result {
  background: url('assets/result/background.png') center center / cover no-repeat;
  image-rendering: pixelated;
  overflow: hidden; justify-content: center; align-items: center; padding: 0;
}
.result-card-wrap {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: clamp(12px, 2.5vh, 20px);
  width: 100%; height: 100dvh;
  padding: clamp(16px, 4vw, 32px);
}
.result-card-inner {
  position: relative;
  width: min(92vw, 92vh);
  max-width: min(92vw, 92vh);
  aspect-ratio: 1 / 1;
}
.result-card-img {
  display: block; width: 100%; height: 100%;
  object-fit: contain;
  image-rendering: pixelated; image-rendering: crisp-edges;
}
.result-flavor-overlay {
  position: absolute;
  top: 80%; left: 11%; right: 48%; height: 11%;
  display: flex; align-items: center; justify-content: flex-start;
  padding: 0 2%; pointer-events: none;
}
.result-flavor-overlay span {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(3px, 2.2vw, 14px);
  color: #ffffff; line-height: 1.2;
  text-align: left; word-break: break-word; hyphens: auto;
}
.result-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

/* Legacy */
.result-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: clamp(12px, 2.5vh, 18px); width: 100%; max-width: 400px; text-align: center; }
.pack-window { width: 100%; max-width: 320px; border: 2.5px solid #6b7280; box-shadow: 2px 2px 0 #fff inset, -2px -2px 0 #7a7a8a inset, 4px 4px 0 rgba(86,87,88,0.4); image-rendering: pixelated; }
.pack-titlebar { display: flex; align-items: center; justify-content: space-between; background: #969eb5; box-shadow: inset 1px 1px 0 #abb2c9, inset -1px -1px 0 #848ca5; padding: 5px 6px 5px 10px; }
.pack-title { font-family: 'Press Start 2P', monospace; font-size: clamp(6px, 2vw, 9px); color: #f0f0f0; letter-spacing: 1px; }
.pack-titlebar-btns { display: flex; gap: 3px; }
.pack-wbtn { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #1a1a1a; background: #9b9fb8; border: 1.5px solid #1a1a1a; box-shadow: 1px 1px 0 #c8ccdc inset, -1px -1px 0 #5a5e74 inset; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; cursor: default; }
.pack-body { background: #edf1ef; box-shadow: -1px -1px 0 #fff inset, 1px 1px 0 #a0a4b8 inset; padding: 12px; }
.pack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pack-tile { background: #d5d7e7; border: 2px solid #1a1a1a; box-shadow: 1px 1px 0 #fff inset, -1px -1px 0 #7a7a8a inset; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 6px 6px; gap: 4px; aspect-ratio: 1; }
.pack-tile-img { width: 60%; height: auto; image-rendering: pixelated; image-rendering: crisp-edges; }
.pack-tile-emoji { font-size: clamp(28px, 9vw, 40px); line-height: 1; }
.pack-tile-label { font-family: 'Press Start 2P', monospace; font-size: clamp(5px, 1.6vw, 7px); color: #2a2a3a; text-align: center; line-height: 1.5; word-break: break-word; }

/* ── HUD ── */
.hud-top-row { display: flex; align-items: center; gap: 6px; }
.pack-slots { display: flex; flex-direction: row; gap: 4px; }
.pack-slot { width: clamp(24px, 7vw, 34px); height: clamp(24px, 7vw, 34px); background: rgba(13,13,26,0.7); border: 2px solid #969eb5; box-shadow: inset 1px 1px 0 #abb2c9, inset -1px -1px 0 #848ca5; display: flex; align-items: center; justify-content: center; image-rendering: pixelated; }
.pack-slot img { width: 80%; height: 80%; object-fit: contain; image-rendering: pixelated; image-rendering: crisp-edges; }
.pack-slot.filled { background: rgba(150,158,181,0.25); border-color: #edf1ef; }
.btn-hint { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #f0f1f5; background: #969eb5; border: none; width: 28px; height: 28px; cursor: pointer; box-shadow: inset -2px -2px 0 #b0b8b0, inset 2px 2px 0 #edf1ef; flex-shrink: 0; touch-action: manipulation; }
.btn-hint:active { transform: translateY(1px); box-shadow: inset -1px -1px 0 #b0b8b0, inset 1px 1px 0 #edf1ef; }

/* ── HINT WINDOW ── */
.hint-window { position: absolute; top: calc(60px + var(--safe-top)); right: 10px; z-index: 30; width: clamp(160px, 50vw, 220px); border: 2px solid #6b7280; box-shadow: 3px 3px 0 rgba(0,0,0,0.4); animation: slideDown 0.15s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.hint-titlebar { display: flex; align-items: center; justify-content: space-between; background: #969eb5; padding: 5px 6px 5px 10px; box-shadow: inset 1px 1px 0 #abb2c9, inset -1px -1px 0 #848ca5; }
.hint-title { font-family: 'Press Start 2P', monospace; font-size: clamp(5px, 1.8vw, 7px); color: #f0f0f0; letter-spacing: 1px; }
.hint-close { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #1a1a1a; background: #9b9fb8; border: 1.5px solid #1a1a1a; box-shadow: 1px 1px 0 #c8ccdc inset, -1px -1px 0 #5a5e74 inset; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: manipulation; }
.hint-body { background: #edf1ef; padding: 8px; max-height: 45vh; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.hint-item { display: flex; align-items: center; gap: 6px; font-family: 'Press Start 2P', monospace; font-size: clamp(5px, 1.6vw, 7px); color: #2a2a3a; padding: 4px 6px; background: #d5d7e7; border: 1.5px solid #9a9db8; line-height: 1.6; }
.hint-item.packed { opacity: 0.4; text-decoration: line-through; }
.hint-item-icon { width: 20px; height: 20px; object-fit: contain; image-rendering: pixelated; flex-shrink: 0; }

/* ── LANDSCAPE ── */
#rotate-msg { display: none; position: fixed; inset: 0; z-index: 9999; background: var(--sky); flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; padding: 32px; }
#rotate-msg .rotate-icon { font-size: 52px; animation: spin90 1.5s ease-in-out infinite alternate; }
@keyframes spin90 { from { transform: rotate(0deg); } to { transform: rotate(-90deg); } }
#rotate-msg p { font-family: 'Press Start 2P', monospace; font-size: clamp(9px, 3vw, 12px); color: var(--text-dim); line-height: 1.9; }

/* ── DESKTOP ── */
@media (hover: hover) and (pointer: fine) {
  .dpad { display: none; }
  .btn-finish { bottom: 28px; }
  .phone-frame { width: 390px; height: 844px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid var(--border); box-shadow: 0 0 60px rgba(167,139,250,0.15); }
  #room-canvas { width: 390px; height: 844px; }
  .intro-bg { width: 390px; height: 844px; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid var(--border); box-shadow: 0 0 60px rgba(167,139,250,0.15); }
  .intro-content, .result-content { max-width: 390px; }
  .result-card-wrap { max-width: 390px; margin: 0 auto; }
}
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="a52735c1-1082-4a1a-92cc-740639db5fee"></script>

<body>

  <!-- CHANGE 2: Hidden span forces browser to load Rubik font before canvas uses it -->
  <span style="font-family:'Rubik';font-weight:500;position:absolute;opacity:0;pointer-events:none;font-size:1px;">.</span>

  <div id="page-intro" class="page active">
    <img class="intro-bg" src="assets/intro/background.png" alt="" aria-hidden="true" />
    <div class="intro-dialog">
      <div class="dialog-titlebar">
        <span class="dialog-title">note.txt</span>
        <div class="dialog-btns">
          <span class="dialog-btn dialog-btn--min">─</span>
          <span class="dialog-btn dialog-btn--close" onclick="window.parent.navigate('home')" style="cursor:pointer;">✕</span>
        </div>
      </div>
      <div class="dialog-body">
        <p class="dialog-text" id="intro-text"></p>
        <span class="dialog-cursor" id="dialog-cursor">▌</span>
        <p class="dialog-hint hidden" id="dialog-hint">— click to continue —</p>
      </div>
    </div>
  </div>

  <div id="page-room" class="page">
    <div class="phone-frame" id="phone-frame">
      <canvas id="room-canvas"></canvas>
      <button onclick="window.parent.navigate('home')" style="position:absolute;top:10px;left:10px;z-index:50;font-family:'Press Start 2P',monospace;font-size:7px;background:rgba(13,13,26,0.85);color:#e0d7ff;border:1px solid rgba(167,139,250,0.4);padding:6px 10px;cursor:pointer;letter-spacing:0.05em;">✕ EXIT</button>
      <div class="hud">
        <div class="hud-top-row">
          <div class="pack-slots" id="pack-slots">
            <div class="pack-slot" id="slot-0"></div>
            <div class="pack-slot" id="slot-1"></div>
            <div class="pack-slot" id="slot-2"></div>
            <div class="pack-slot" id="slot-3"></div>
          </div>
          <button class="btn-hint" id="btn-hint" onclick="toggleHintWindow()">?</button>
        </div>
        <div class="hud-hint" id="hud-hint">Choose what matters most to you.</div>
      </div>
      <div class="hint-window hidden" id="hint-window">
        <div class="hint-titlebar">
          <span class="hint-title">ITEMS IN ROOM</span>
          <button class="hint-close" onclick="toggleHintWindow()">✕</button>
        </div>
        <div class="hint-body" id="hint-body"></div>
      </div>
      <button class="btn-pixel btn-finish hidden" id="btn-finish" onclick="finishPacking()">✓ Finish Packing</button>
      <div class="item-popup hidden" id="item-popup">
        <div class="popup-inner">
          <img class="popup-frame-img" src="assets/ui/popup_frame.png" alt="" aria-hidden="true" />
          <div class="popup-content">
            <div class="popup-icon-wrap">
              <img class="popup-icon-bg" src="assets/ui/item_icon_bg.png" alt="" aria-hidden="true" />
              <div class="popup-icon" id="popup-icon">🪴</div>
            </div>
            <div class="popup-name" id="popup-name">Item Name</div>
            <div class="popup-desc" id="popup-desc">A short description.</div>
            <div class="popup-btns">
              <button class="btn-ui" id="btn-pack" onclick="packItem()"><img src="assets/ui/btn_pack.png" alt="Pack It" /></button>
              <button class="btn-ui btn-ui--leave" onclick="closePopup()"><img src="assets/ui/btn_leave.png" alt="Leave It" /></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-goodluck" class="page">

const SPEED = 2, INTERACT_RADIUS = 50, PLAYER_SIZE = 24, ITEM_SIZE = 52;

/* ═══════════════════════════════════════════

let canvas, ctx;
const IMAGES = {};
const IMAGE_SOURCES = {

const FURNITURE = [
  { img: 'furn_bed',          x: 14, y: 28, w: 23, h: 18, collision: { x: 12,  y: 28,   w: 26, h: 18 } },
  { img: 'furn_nightstand',   x: 1,  y: 24, w: 11, h: 11, collision: { x: 1,   y: 24,   w: 12, h: 11 } },
  { img: 'furn_armchair',     x: 53, y: 26, w: 20, h: 10, collision: { x: 53,  y: 26,   w: 20, h: 10 } },
  { img: 'furn_sofa_right',   x: 75, y: 26, w: 20, h: 10, collision: { x: 75,  y: 26,   w: 20, h: 10 } },
  { img: 'furn_rug',          x: 47, y: 39, w: 51, h: 15 },
  { img: 'furn_sofa_left',    x: 9,  y: 55, w: 34, h: 9,  collision: { x: 9,   y: 55,   w: 34, h: 9  } },
  { img: 'furn_cabinet',      x: 70, y: 58, w: 29, h: 19, collision: { x: 70,  y: 62.2, w: 29, h: 15 } },
  { img: 'furn_dining_table', x: 9,  y: 67, w: 35, h: 12, collision: { x: 9,   y: 67,   w: 35, h: 12 } },
  { img: 'furn_picture1',     x: 12, y: 17, w: 10, h: 6,  collision: null },
  { img: 'furn_picture2',     x: 19, y: 22, w: 6,  h: 3,  collision: null },
  { img: 'furn_window',       x: 58, y: 10, w: 28, h: 12, collision: null },
];
const DEBUG_FURNITURE = false;
const WALL_ZONES = [
  { x: 0,  y: 0,  w: 100, h: 32.5, label: 'top wall'    },
  { x: 0,  y: 0,  w: 3,   h: 100,  label: 'left wall'   },
  { x: 97, y: 0,  w: 3,   h: 100,  label: 'right wall'  },
  { x: 0,  y: 95, w: 100, h: 5,    label: 'bottom wall' },
];
const DEBUG_WALLS = false;
const SPRITE = { frameW: 101, frameH: 150, frameCount: 4, frameSpeed: 2, drawH: 52, drawW: 35 };
const DEBUG_SPRITE = false;

function loadAllImages() {
  const promises = Object.entries(IMAGE_SOURCES).map(([key, src]) => {
    return new Promise((resolve) => {
      const img = new Image();
      img.src = src;
      img.onload  = () => { IMAGES[key] = img; resolve(); };
      img.onerror = () => { console.warn(`⚠️ Could not load image: ${src}`); IMAGES[key] = null; resolve(); };
    });
  });
  return Promise.all(promises);
}
function initCanvas() {
  canvas = document.getElementById('room-canvas');
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}
function resizeCanvas() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  state.canvasW = canvas.width; state.canvasH = canvas.height;
}

function drawBackground() {
  const W = state.canvasW, H = state.canvasH;
  if (IMAGES.room) { ctx.drawImage(IMAGES.room, 0, 0, W, H); }
  else {
    ctx.fillStyle = '#3b2d1e'; ctx.fillRect(0, 0, W, H);
    const wallH = H * 0.45;
    ctx.fillStyle = '#2d2b55'; ctx.fillRect(0, 0, W, wallH);
    ctx.fillStyle = '#4a3d7a'; ctx.fillRect(0, wallH - 4, W, 8);
    drawWindow(W * 0.5 - 50, wallH * 0.1, 100, wallH * 0.6);
    drawRug(W * 0.3, H * 0.5, W * 0.4, H * 0.25);
  }
}
function drawWindow(x, y, w, h) {
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(x-4, y-4, w+8, h+8);
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, '#0d0d1a'); grad.addColorStop(1, '#1a1a3e');
  ctx.fillStyle = grad; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#fef9c3'; ctx.beginPath(); ctx.arc(x+w*0.6, y+h*0.3, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2d2b55'; ctx.fillRect(x+w/2-2, y, 4, h); ctx.fillRect(x, y+h/2-2, w, 4);
}
function drawRug(x, y, w, h) {
  ctx.fillStyle = '#4c1d7a'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#6d2b99'; ctx.fillRect(x+6, y+6, w-12, h-12);
  ctx.fillStyle = '#a855f7';
  const cx = x+w/2, cy = y+h/2;
  ctx.beginPath(); ctx.moveTo(cx, cy-20); ctx.lineTo(cx+20, cy); ctx.lineTo(cx, cy+20); ctx.lineTo(cx-20, cy); ctx.closePath(); ctx.fill();
}
function drawPlayer() {
  const px = state.playerX, py = state.playerY;
  const drawX = px - SPRITE.drawW / 2, drawY = py - SPRITE.drawH;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(px, py + 3, SPRITE.drawW * 0.45, 5, 0, 0, Math.PI * 2); ctx.fill();
  if (IMAGES.player) {
    const col = Math.floor(state.walkFrame / SPRITE.frameSpeed) % SPRITE.frameCount;
    ctx.drawImage(IMAGES.player, col * SPRITE.frameW, state.facing * SPRITE.frameH, SPRITE.frameW, SPRITE.frameH, drawX, drawY, SPRITE.drawW, SPRITE.drawH);
  } else {
    const size = PLAYER_SIZE;
    ctx.fillStyle = '#7c6fcd'; ctx.fillRect(px-size/3, py-size*0.8, (size/3)*2, size*0.55);
    ctx.fillStyle = '#fcd9a0'; ctx.fillRect(px-size/3+2, py-size*1.2, (size/3)*2-4, size*0.5);
    ctx.fillStyle = '#374151';
    ctx.fillRect(px-size/3+2, py-size*0.25, size/4, size*0.35);
    ctx.fillRect(px+2, py-size*0.25, size/4, size*0.35);
  }
}
function draw() {
  ctx.clearRect(0, 0, state.canvasW, state.canvasH);
  drawBackground(); drawDepthSorted();
}
function drawDepthSorted() {
  const W = state.canvasW, H = state.canvasH;
  const drawables = [];
  FURNITURE.forEach(furn => {
    const fx = furn.x/100*W, fy = furn.y/100*H, fw = furn.w/100*W, fh = furn.h/100*H;
    if (furn.img && IMAGES[furn.img]) drawables.push({ sortY: fy+fh, draw: () => ctx.drawImage(IMAGES[furn.img], fx, fy, fw, fh) });
  });
  ITEMS.forEach(item => drawSingleItem(item));
  drawables.sort((a, b) => a.sortY - b.sortY);
  drawables.forEach(d => d.draw());
  drawPlayer();
}
function drawSingleItem(item) {
  const packed = state.packedItems.includes(item.id);
  const ix = item.rx/100*state.canvasW, iy = item.ry/100*state.canvasH;
  const imgKey = `item_${item.id}`;
  const baseSize = (item.sizePct || 10) / 100 * state.canvasW;
  let drawW = baseSize, drawH = baseSize;
  if (IMAGES[imgKey]) {
    const nat = IMAGES[imgKey];
    const natW = nat.naturalWidth||nat.width||1, natH = nat.naturalHeight||nat.height||1;
    if (natW >= natH) { drawW = baseSize; drawH = baseSize*(natH/natW); }
    else { drawH = baseSize; drawW = baseSize*(natW/natH); }
  }
  if (packed) ctx.globalAlpha = 0.3;
  const glowR = Math.max(drawW, drawH) * 0.55;
  const glow = ctx.createRadialGradient(ix, iy, 0, ix, iy, glowR);
  glow.addColorStop(0, packed ? 'rgba(100,100,100,0.1)' : 'rgba(167,139,250,0.18)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(ix, iy, glowR, 0, Math.PI*2); ctx.fill();
  if (IMAGES[imgKey]) ctx.drawImage(IMAGES[imgKey], ix-drawW/2, iy-drawH/2, drawW, drawH);
  else { ctx.font = `${drawH}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(item.emoji, ix, iy); }
  ctx.globalAlpha = 1.0;
}

/* ═══════════════════════════════════════════
   SECTION 5: PLAYER MOVEMENT
═══════════════════════════════════════════ */
function isMoving(dir) {
  if (dir === 'up')    return state.keys['ArrowUp']    || state.keys['w'] || state.keys['W'];
  if (dir === 'down')  return state.keys['ArrowDown']  || state.keys['s'] || state.keys['S'];
  if (dir === 'left')  return state.keys['ArrowLeft']  || state.keys['a'] || state.keys['A'];
  if (dir === 'right') return state.keys['ArrowRight'] || state.keys['d'] || state.keys['D'];
}
function updatePlayer() {
  let moved = false, dx = 0, dy = 0;
  if (isMoving('up'))    { dy -= 1; state.facing = 3; moved = true; }
  if (isMoving('down'))  { dy += 1; state.facing = 0; moved = true; }
  if (isMoving('left'))  { dx -= 1; state.facing = 1; moved = true; }
  if (isMoving('right')) { dx += 1; state.facing = 2; moved = true; }
  if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
  if (!moved && state.targetX !== null && state.targetY !== null) {
    const tdx = state.targetX - state.playerX, tdy = state.targetY - state.playerY;
    const dist = Math.sqrt(tdx*tdx + tdy*tdy);
    if (dist > SPEED + 1) {
      dx = tdx/dist; dy = tdy/dist; moved = true;
      if (Math.abs(tdx) > Math.abs(tdy)) state.facing = tdx > 0 ? 2 : 1;
      else state.facing = tdy > 0 ? 0 : 3;
    } else { state.targetX = null; state.targetY = null; }
  }
  let newX = state.playerX + dx*SPEED, newY = state.playerY + dy*SPEED;
  const margin = 16;
  newX = Math.max(margin, Math.min(state.canvasW - margin, newX));
  newY = Math.max(margin, Math.min(state.canvasH - margin, newY));
  if (!isBlocked(newX, newY)) { state.playerX = newX; state.playerY = newY; }
  else if (!isBlocked(newX, state.playerY)) { state.playerX = newX; }
  else if (!isBlocked(state.playerX, newY)) { state.playerY = newY; }
  else { state.targetX = null; state.targetY = null; }
  if (moved) {
    state.frameTimer++;
    if (state.frameTimer >= SPRITE.frameSpeed) {
      state.walkFrame++;
      state.frameTimer = 0;
      if (state.walkFrame >= SPRITE.frameCount * SPRITE.frameSpeed) state.walkFrame = 0;
    }
  } else { state.walkFrame = 0; state.frameTimer = 0; }
  checkItemProximity();
}
function isInsideWall(px, py) {
  const W = state.canvasW, H = state.canvasH;
  if (!W || !H) return false;
  return WALL_ZONES.some(zone => {
    const zx=zone.x/100*W, zy=zone.y/100*H, zw=zone.w/100*W, zh=zone.h/100*H;
    return px>=zx && px<=zx+zw && py>=zy && py<=zy+zh;
  });
}
function isInsideFurniture(px, py) {
  const W = state.canvasW, H = state.canvasH;
  if (!W || !H) return false;
  return FURNITURE.some(furn => {
    if (!furn.collision) return false;
    const cx=furn.collision.x/100*W, cy=furn.collision.y/100*H, cw=furn.collision.w/100*W, ch=furn.collision.h/100*H;
    return px>=cx && px<=cx+cw && py>=cy && py<=cy+ch;
  });
}
function isBlocked(px, py) { return isInsideWall(px, py) || isInsideFurniture(px, py); }
function checkItemProximity() {
  if (state.activeItem !== null) return;
  if (state.packedItems.length >= 4) return;
  for (const item of ITEMS) {
    if (state.packedItems.includes(item.id)) continue;
    const ix=item.rx/100*state.canvasW, iy=item.ry/100*state.canvasH;
    const dx=state.playerX-ix, dy=state.playerY-iy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (state.dismissedItems.includes(item.id) && dist > INTERACT_RADIUS*1.5)
      state.dismissedItems = state.dismissedItems.filter(id => id !== item.id);
    if (state.dismissedItems.includes(item.id)) continue;
    if (dist < INTERACT_RADIUS) { showItemPopup(item); break; }
  }
}

/* ═══════════════════════════════════════════
   SECTION 6: ITEM INTERACTION
═══════════════════════════════════════════ */
function showItemPopup(item) {
  state.activeItem = item;
  const iconEl = document.getElementById('popup-icon');
  const imgKey = `item_${item.id}`;
  if (IMAGES[imgKey]) {
    iconEl.innerHTML = '';
    const img = document.createElement('img');
    img.src = IMAGES[imgKey].src; img.alt = item.name;
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges;';
    iconEl.appendChild(img);
  } else { iconEl.innerHTML = item.emoji; }
  document.getElementById('popup-name').textContent = item.name;
  document.getElementById('popup-desc').textContent = item.secret ? item.desc + ' ...You almost didn\'t see it.' : item.desc;
  document.getElementById('item-popup').classList.remove('hidden');
}
function closePopup() {
  if (state.activeItem) state.dismissedItems.push(state.activeItem.id);
  state.activeItem = null;
  document.getElementById('item-popup').classList.add('hidden');
}
function packItem() {
  if (!state.activeItem) return;
  const item = state.activeItem;
  if (state.packedItems.includes(item.id)) { closePopup(); return; }
  state.packedItems.push(item.id);
  const count = state.packedItems.length;
  fillPackSlot(item, count - 1);
  refreshHintWindow();
  closePopup();
  const hints = ["What else can't you leave behind?","3 more to go...","Almost there...","That's the one. What else?"];
  document.getElementById('hud-hint').textContent = count < 4 ? hints[count-1] || "Keep going..." : "Your bag is full.";
  if (count >= 4) {
    document.getElementById('btn-finish').classList.remove('hidden');
    document.getElementById('hud-hint').textContent = "You're ready. Say goodbye to this room.";
  }
}
function fillPackSlot(item, slotIndex) {
  const slot = document.getElementById(`slot-${slotIndex}`);
  if (!slot) return;
  const imgKey = `item_${item.id}`;
  if (IMAGES[imgKey]) {
    const img = document.createElement('img');
    img.src = IMAGES[imgKey].src; img.alt = item.name;
    slot.appendChild(img);
  } else { slot.textContent = item.emoji; slot.style.fontSize = '18px'; }
  slot.classList.add('filled'); slot.title = item.name;
}
function clearPackSlots() {
  for (let i = 0; i < 4; i++) {
    const slot = document.getElementById(`slot-${i}`);
    if (!slot) continue;
    slot.innerHTML = ''; slot.classList.remove('filled'); slot.style.fontSize = ''; slot.title = '';
  }
}
function toggleHintWindow() {
  const win = document.getElementById('hint-window');
  if (win.classList.contains('hidden')) { refreshHintWindow(); win.classList.remove('hidden'); }
  else win.classList.add('hidden');
}
function refreshHintWindow() {
  const body = document.getElementById('hint-body');
  if (!body) return;
  body.innerHTML = '';
  ITEMS.forEach(item => {
    const isPacked = state.packedItems.includes(item.id);
    const row = document.createElement('div');
    row.className = 'hint-item' + (isPacked ? ' packed' : '');
    const imgKey = `item_${item.id}`;
    if (IMAGES[imgKey]) {
      const img = document.createElement('img');
      img.src = IMAGES[imgKey].src; img.alt = item.name; img.className = 'hint-item-icon';
      row.appendChild(img);
    } else {
      const em = document.createElement('span');
      em.textContent = item.emoji; em.style.fontSize = '14px'; row.appendChild(em);
    }
    const label = document.createElement('span');
    label.textContent = item.name + (isPacked ? ' ✓' : '');
    row.appendChild(label);
    body.appendChild(row);
  });
}

function calculateCosmicArchetype() {
  const votes = {};
  state.packedItems.forEach(id => {
    const archetype = ITEM_ARCHETYPE_VOTE[id];
    if (archetype) votes[archetype] = (votes[archetype] || 0) + 1;
  });
  let topArchetype = null, topCount = 0;
  for (const [archetype, count] of Object.entries(votes)) {
    if (count > topCount) { topCount = count; topArchetype = archetype; }
  }
  const item1Vote = ITEM_ARCHETYPE_VOTE[state.packedItems[0]];
  if (item1Vote && votes[item1Vote] === topCount) topArchetype = item1Vote;
  return topArchetype || "dreamer";
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
const INTRO_LINES = ["I'm leaving to Lune","in a few hours...","","but I haven't packed","my bag yet.","","I need to hurry."];
const TYPING_SPEED_MS = 45;
function initIntro() {
  const textEl = document.getElementById('intro-text');
  const hintEl = document.getElementById('dialog-hint');
  if (!textEl) return;
  const fullText = INTRO_LINES.join('\n');
  let charIndex = 0, skipToEnd = false;
  const skipHandler = () => { skipToEnd = true; };
  document.getElementById('page-intro').addEventListener('click', skipHandler, { once: true });
  function typeNextChar() {
    if (skipToEnd) { textEl.innerHTML += fullText.slice(charIndex).replace(/\n/g, '<br>'); charIndex = fullText.length; onTypingDone(); return; }
    if (charIndex >= fullText.length) { onTypingDone(); return; }
    const char = fullText[charIndex++];
    if (char === '\n') textEl.innerHTML += '<br>';
    else textEl.innerHTML += char === '<' ? '&lt;' : char === '>' ? '&gt;' : char;
    setTimeout(typeNextChar, '.…!?'.includes(char) ? TYPING_SPEED_MS * 6 : TYPING_SPEED_MS);
  }
  function onTypingDone() {
    document.getElementById('page-intro').removeEventListener('click', skipHandler);
    hintEl.classList.remove('hidden');
    document.getElementById('page-intro').addEventListener('click', startGame, { once: true });
  }
  setTimeout(typeNextChar, 400);
}
function startGame() {
  showPage('page-room'); initCanvas(); setupInput(); setupDpad();
  state.playerX = state.canvasW / 2; state.playerY = state.canvasH * 0.7;
  state.packedItems = []; state.dismissedItems = []; state.activeItem = null;
  clearPackSlots();
  document.getElementById('hint-window')?.classList.add('hidden');
  document.getElementById('btn-finish').classList.add('hidden');
  document.getElementById('hud-hint').textContent = 'Loading assets...';
  loadAllImages().then(() => {
    document.getElementById('hud-hint').textContent = 'Choose what matters most to you.';
    if (state.loopId) cancelAnimationFrame(state.loopId);
    gameLoop();
  });
}
function gameLoop() { updatePlayer(); draw(); state.loopId = requestAnimationFrame(gameLoop); }

function finishPacking() {
  cancelAnimationFrame(state.loopId);
  const firstItemId = state.packedItems[0];
  const archetype = calculateCosmicArchetype();
  const role = ITEM_TO_ROLE[firstItemId] || ITEM_TO_ROLE[11];
  const flavor = role.flavors[archetype] || role.flavors["dreamer"];
  document.getElementById('result-card-img').src = `assets/result/item_${firstItemId}.png`;
  document.getElementById('cosmic-flavor').innerHTML = flavor.replace(/\n/g, '<br>');
  if (!canvas || !ctx) { showPage('page-goodluck'); return; }
  pixelDissolve(() => { showPage('page-goodluck'); });
}
function revealResult() { showPage('page-result'); }
function pixelDissolve(onComplete) {
  try {
    const BLOCK = 8;
    const cols = Math.ceil(canvas.width/BLOCK), rows = Math.ceil(canvas.height/BLOCK);
    const total = cols * rows;
    const indices = Array.from({ length: total }, (_, i) => i);
    for (let i = indices.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [indices[i],indices[j]] = [indices[j],indices[i]]; }
    let filled = 0;
    const SPD = Math.ceil(total / 40);
    function dissolveFrame() {
      try {
        const batch = Math.min(SPD, total - filled);
        for (let b = 0; b < batch; b++) {
          const idx = indices[filled+b];
          ctx.fillStyle = '#0d0d1a';
          ctx.fillRect((idx%cols)*BLOCK, Math.floor(idx/cols)*BLOCK, BLOCK, BLOCK);
        }
        filled += batch;
        if (filled < total) requestAnimationFrame(dissolveFrame); else onComplete();
      } catch(e) { onComplete(); }
    }
    requestAnimationFrame(dissolveFrame);
  } catch(e) { onComplete(); }
}
function restartGame() {
  state.packedItems = []; state.dismissedItems = []; state.activeItem = null;
  clearPackSlots();
  document.getElementById('hint-window')?.classList.add('hidden');
  const textEl = document.getElementById('intro-text');
  const hintEl = document.getElementById('dialog-hint');
  if (textEl) textEl.innerHTML = '';
  if (hintEl) hintEl.classList.add('hidden');
  showPage('page-intro'); initIntro();
}

function setupInput() {
  document.addEventListener('keydown', e => {
    state.keys[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if (e.key === 'Escape') closePopup();
  });
  document.addEventListener('keyup', e => { state.keys[e.key] = false; });
  canvas.addEventListener('pointerdown', e => {
    if (state.activeItem !== null) return;
    const rect = canvas.getBoundingClientRect();
    state.targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
    state.targetY = (e.clientY - rect.top) * (canvas.height / rect.height);
  });
}

/* ═══════════════════════════════════════════
   SECTION 10: SAVE CARD GENERATOR

     card image, flavor text, and Rubik watermark
═══════════════════════════════════════════ */
function downloadStoryCard() {
  // Capture exactly what's shown on the result page using html2canvas,
  // then composite it onto a full 9:16 canvas with background + watermark.

  const cardInner = document.getElementById('page-result');
  if (!cardInner) return;

  // Show a quick loading indicator on the button
  const btn = document.querySelector('.result-btns .btn-pixel');
  const origText = btn ? btn.textContent : '';
  if (btn) btn.textContent = '...';

  // Hide buttons before capture
  const btnsEl = document.querySelector('#page-result .result-btns');
  if (btnsEl) btnsEl.style.visibility = 'hidden';

  html2canvas(cardInner, {
    useCORS: true,
    allowTaint: true,
    backgroundColor: null,
    scale: 2,
    logging: false,
  }).then(captured => {
    // Restore buttons
    if (btnsEl) btnsEl.style.visibility = '';
    // Build final 1080×1920 share canvas
    const shareCanvas = document.getElementById('share-canvas');
    const sc = shareCanvas.getContext('2d');
    sc.imageSmoothingEnabled = false;
    const W = 1080, H = 1920;

    // 1. Background
    if (IMAGES.result_bg) {
      sc.drawImage(IMAGES.result_bg, 0, 0, W, H);
    } else {
      sc.fillStyle = '#0d0d1a';
      sc.fillRect(0, 0, W, H);
    }

    // 2. Draw the captured result page, centered, scaled to fit width
    const capAspect = captured.height / captured.width;
    const drawW = W;
    const drawH = drawW * capAspect;
    const drawY = (H - drawH) / 2;
    sc.drawImage(captured, 0, drawY, drawW, drawH);

    // 3. Watermark — bottom center, Rubik 500, semi-transparent white
    sc.font      = '500 28px "Rubik", sans-serif';
    sc.fillStyle = 'rgba(255, 255, 255, 0.85)';
    sc.textAlign = 'center';
    sc.fillText('@conycorn.studio', W / 2, H - 60);

    // 4. Download
    const link    = document.createElement('a');
    link.download = 'pack-for-lune.png';
    link.href     = shareCanvas.toDataURL('image/png');
    link.click();

    // Restore button
    if (btn) btn.textContent = origText;

  }).catch(err => {
    console.error('html2canvas error:', err);
    if (btnsEl) btnsEl.style.visibility = '';
    if (btn) btn.textContent = origText;
  });
}

function generateStars(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;--dur:${Math.random()*3+2}s;--delay:${Math.random()*4}s;`;
    container.appendChild(star);
  }
}

function checkOrientation() {
  const rotateMsg = document.getElementById('rotate-msg');
  if (!rotateMsg) return;
  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  const isLandscape = window.innerWidth > window.innerHeight;
  rotateMsg.style.display = (isTouchDevice && isLandscape) ? 'flex' : 'none';
}
