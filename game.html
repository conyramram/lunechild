<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pack for Lune</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   STYLE.CSS — Pack for Lune
   📱 Phone-first, portrait-only layout
════════════════════════════════════════════ */

:root {
  --sky:        #0d0d1a;
  --sky-mid:    #1a1a2e;
  --indigo:     #2d2b55;
  --lavender:   #a78bfa;
  --soft-pink:  #f9a8d4;
  --moon:       #fef9c3;
  --text-light: #e0d7ff;
  --text-dim:   #a09cbb;
  --btn-bg:     #969eb5;
  --btn-hover:  #6d5cc9;
  --card-bg:    rgba(255,255,255,0.07);
  --border:     rgba(167,139,250,0.3);

  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  height: 100%;
  overflow: hidden;
}

body {
  width: 100vw;
  height: 100dvh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  background: var(--sky);
  font-family: 'VT323', monospace;
  color: var(--text-light);
  image-rendering: pixelated;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

.page {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100dvh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top:    var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

.page.active { display: flex; }


/* ════════════════════════════════════════════
   PAGE 1 — INTRO
════════════════════════════════════════════ */

#page-intro {
  background: #6b7280;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  justify-content: center;
  align-items: center;
}

.intro-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100dvh;
  object-fit: fill;
  z-index: 0;
  image-rendering: pixelated;
}

.intro-dialog {
  position: relative;
  z-index: 2;
  width: clamp(200px, 60vw, 260px);
  border: 2.5px solid #1a1a1a;
  box-shadow:
    2px 2px 0 #ffffff inset,
    -2px -2px 0 #7a7a8a inset,
    4px 4px 0 rgba(0,0,0,0.35);
  background: transparent;
  image-rendering: pixelated;
}

.dialog-titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #8b8fa8;
  box-shadow: inset 1px 1px 0 #b0b4c8, inset -1px -1px 0 #5a5e74;
  padding: 5px 6px 5px 10px;
  gap: 8px;
}

.dialog-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 2vw, 8px);
  color: #f0f0f0;
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dialog-btns {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.dialog-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: clamp(18px, 5.5vw, 24px);
  height: clamp(18px, 5.5vw, 24px);
  background: #9b9fb8;
  border: 1.5px solid #1a1a1a;
  box-shadow:
    1px 1px 0 #c8ccdc inset,
    -1px -1px 0 #5a5e74 inset;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(5px, 1.8vw, 7px);
  color: #1a1a1a;
  cursor: pointer;
  line-height: 1;
}

.dialog-body {
  background: #f0f0ec;
  box-shadow:
    -1px -1px 0 #ffffff inset,
    1px 1px 0 #a0a4b8 inset;
  padding: 14px 14px 18px;
  min-height: clamp(100px, 22vh, 160px);
  position: relative;
}

.dialog-text {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 2.2vw, 10px);
  color: #2a2a3a;
  line-height: 2;
  display: inline;
  word-break: break-word;
}

.dialog-cursor {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 2.2vw, 10px);
  color: #2a2a3a;
  animation: blink 0.8s step-start infinite;
  display: inline;
}

@keyframes blink { 50% { opacity: 0; } }

.dialog-hint {
  margin-top: clamp(16px, 4vw, 24px);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 1.8vw, 8px);
  color: #6b6f88;
  text-align: center;
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0);   }
}

.hidden { display: none !important; }


/* ── Pixel Buttons ── */
.btn-pixel {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(8px, 3vw, 11px);
  color: #f0f1f5;
  background: var(--btn-bg);
  border: none;
  padding: clamp(13px, 3.5vw, 16px) clamp(18px, 5vw, 26px);
  cursor: pointer;
  box-shadow:
    inset -3px -3px 0 #b0b8b0,
    inset  3px  3px 0 #edf1ef,
    0 0 18px rgba(218,223,220,0.3);
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing: 1px;
  line-height: 1.6;
  touch-action: manipulation;
}

.btn-pixel:active {
  transform: translateY(2px);
  box-shadow:
    inset -2px -2px 0 #b0b8b0,
    inset  2px  2px 0 #edf1ef;
}

.btn-small {
  font-size: clamp(7px, 2.5vw, 10px);
  padding: clamp(10px, 2.5vw, 13px) clamp(13px, 4vw, 18px);
}

.btn-cancel, .btn-secondary {
  background: rgba(255,255,255,0.05);
  box-shadow:
    inset -3px -3px 0 rgba(0,0,0,0.3),
    inset  3px  3px 0 rgba(255,255,255,0.1);
  color: var(--text-dim);
}


/* ════════════════════════════════════════════
   PAGE 2 — ROOM / GAME CANVAS
════════════════════════════════════════════ */

#page-room {
  background: #0d0d1a;
  position: relative;
  justify-content: center;
  align-items: center;
  padding: 0;
}

/* Phone frame — contains canvas + all UI overlays */
.phone-frame {
  position: relative;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
}

#room-canvas {
  display: block;
  image-rendering: pixelated;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.hud {
  position: absolute;
  top: calc(10px + var(--safe-top));
  right: 10px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  max-width: 80%;
}

.hud-items {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 2.8vw, 10px);
  color: var(--moon);
  background: rgba(13,13,26,0.88);
  padding: 6px 10px;
  border: 1px solid var(--border);
  backdrop-filter: blur(4px);
  white-space: nowrap;
}

.hud-hint {
  font-size: clamp(13px, 4vw, 16px);
  color: var(--text-dim);
  padding: 3px 8px;
  text-align: right;
  line-height: 1.3;
}

.btn-finish {
  position: absolute;
  bottom: calc(20px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  white-space: nowrap;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: inset -3px -3px 0 #b0b8b0, inset 3px 3px 0 #edf1ef, 0 0 12px rgba(237,241,239,0.3); }
  50%       { box-shadow: inset -3px -3px 0 #b0b8b0, inset 3px 3px 0 #edf1ef, 0 0 28px rgba(237,241,239,0.7); }
}

.dpad {
  display: none !important;
}

.dpad-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 4vw, 16px);
  background: rgba(76,61,143,0.75);
  color: var(--moon);
  border: 1px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  cursor: pointer;
}

.dpad-btn:active { background: var(--btn-hover); }

.dpad-up    { grid-column: 2; grid-row: 1; }
.dpad-left  { grid-column: 1; grid-row: 2; }
.dpad-down  { grid-column: 2; grid-row: 3; }
.dpad-right { grid-column: 3; grid-row: 2; }

/* ── Item Popup ── */
.item-popup {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  display: flex;
  justify-content: center;
  background: linear-gradient(to top, rgba(13,13,26,0.95) 60%, transparent);
  padding: 16px 16px calc(16px + var(--safe-bottom));
  animation: slideUp 0.2s ease;
}

@keyframes slideUp {
  from { transform: translateY(16px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.popup-inner {
  position: relative;
  width: 100%;
  max-width: 400px;
}

.popup-frame-img {
  display: block;
  width: 100%;
  height: auto;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.popup-content {
  position: absolute;
  top: 12%;
  left: 8%;
  right: 8%;
  bottom: 8%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  text-align: center;
  gap: 4px;
}

.popup-icon-wrap {
  position: relative;
  width: clamp(52px, 16vw, 72px);
  height: clamp(52px, 16vw, 72px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.popup-icon-bg {
  display: none;
}

.popup-icon {
  position: relative;
  z-index: 1;
  font-size: clamp(24px, 8vw, 36px);
  line-height: 1;
}

.popup-name {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 2.5vw, 10px);
  color: #55556b;
  line-height: 1.6;
}

.popup-desc {
  font-size: clamp(13px, 4vw, 17px);
  color: var(--text-dim);
  line-height: 1.5;
}

.popup-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-ui {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  touch-action: manipulation;
  width: clamp(90px, 28vw, 130px);
  transition: transform 0.1s, opacity 0.1s;
}

.btn-ui img {
  width: 100%;
  height: auto;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.btn-ui:active {
  transform: translateY(2px);
  opacity: 0.85;
}


/* ════════════════════════════════════════════
   PAGE 3 — RESULT SCREEN
════════════════════════════════════════════ */

#page-result {
  background: url('assets/result/background.png') center center / 390px 844px no-repeat;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  justify-content: center !important;
  align-items: center !important;
  padding: 16px;
}

.result-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(12px, 2.5vh, 18px);
  width: 100%;
  max-width: 400px;
  text-align: center;
}

/* ── Win95-style packing result window ── */
.pack-window {
  width: 100%;
  max-width: 320px;
  border: 2.5px solid #6b7280;
  box-shadow:
    2px 2px 0 #fff inset,
    -2px -2px 0 #7a7a8a inset,
    4px 4px 0 rgba(86,87,88,0.4);
  image-rendering: pixelated;
}

.pack-titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #969eb5;
  box-shadow: inset 1px 1px 0 #abb2c9, inset -1px -1px 0 #848ca5;
  padding: 5px 6px 5px 10px;
}

.pack-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 2vw, 9px);
  color: #f0f0f0;
  letter-spacing: 1px;
}

.pack-titlebar-btns {
  display: flex;
  gap: 3px;
}

.pack-wbtn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #1a1a1a;
  background: #9b9fb8;
  border: 1.5px solid #1a1a1a;
  box-shadow: 1px 1px 0 #c8ccdc inset, -1px -1px 0 #5a5e74 inset;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
}

.pack-body {
  background: #edf1ef;
  box-shadow: -1px -1px 0 #fff inset, 1px 1px 0 #a0a4b8 inset;
  padding: 12px;
}

.pack-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.pack-tile {
  background: #d5d7e7;
  border: 2px solid #1a1a1a;
  box-shadow: 1px 1px 0 #fff inset, -1px -1px 0 #7a7a8a inset;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 6px 6px;
  gap: 4px;
  aspect-ratio: 1;
}

.pack-tile-img {
  width: 60%;
  height: auto;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.pack-tile-emoji {
  font-size: clamp(28px, 9vw, 40px);
  line-height: 1;
}

.pack-tile-label {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(5px, 1.6vw, 7px);
  color: #2a2a3a;
  text-align: center;
  line-height: 1.5;
  word-break: break-word;
}

.result-btns {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  padding-bottom: 4px;
}


/* ── HUD top row (slots + hint button) ── */
.hud-top-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── Packing slots (inside HUD top-right) ── */
.pack-slots {
  display: flex;
  flex-direction: row;
  gap: 4px;
}

.pack-slot {
  width: clamp(24px, 7vw, 34px);
  height: clamp(24px, 7vw, 34px);
  background: rgba(13,13,26,0.7);
  border: 2px solid #969eb5;
  box-shadow: inset 1px 1px 0 #abb2c9, inset -1px -1px 0 #848ca5;
  display: flex;
  align-items: center;
  justify-content: center;
  image-rendering: pixelated;
}

.pack-slot img {
  width: 80%;
  height: 80%;
  object-fit: contain;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.pack-slot.filled {
  background: rgba(150,158,181,0.25);
  border-color: #edf1ef;
}
.btn-hint {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: #f0f1f5;
  background: #969eb5;
  border: none;
  width: 28px;
  height: 28px;
  cursor: pointer;
  box-shadow:
    inset -2px -2px 0 #b0b8b0,
    inset  2px  2px 0 #edf1ef;
  flex-shrink: 0;
  touch-action: manipulation;
}
.btn-hint:active {
  transform: translateY(1px);
  box-shadow:
    inset -1px -1px 0 #b0b8b0,
    inset  1px  1px 0 #edf1ef;
}

/* ── Hint window ── */
.hint-window {
  position: absolute;
  top: calc(60px + var(--safe-top));
  right: 10px;
  z-index: 30;
  width: clamp(160px, 50vw, 220px);
  border: 2px solid #6b7280;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
  animation: slideDown 0.15s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hint-titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #969eb5;
  padding: 5px 6px 5px 10px;
  box-shadow: inset 1px 1px 0 #abb2c9, inset -1px -1px 0 #848ca5;
}

.hint-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(5px, 1.8vw, 7px);
  color: #f0f0f0;
  letter-spacing: 1px;
}

.hint-close {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #1a1a1a;
  background: #9b9fb8;
  border: 1.5px solid #1a1a1a;
  box-shadow: 1px 1px 0 #c8ccdc inset, -1px -1px 0 #5a5e74 inset;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  touch-action: manipulation;
}

.hint-body {
  background: #edf1ef;
  padding: 8px;
  max-height: 45vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hint-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(5px, 1.6vw, 7px);
  color: #2a2a3a;
  padding: 4px 6px;
  background: #d5d7e7;
  border: 1.5px solid #9a9db8;
  line-height: 1.6;
}

.hint-item.packed {
  opacity: 0.4;
  text-decoration: line-through;
}

.hint-item-icon {
  width: 20px;
  height: 20px;
  object-fit: contain;
  image-rendering: pixelated;
  flex-shrink: 0;
}

/* ════════════════════════════════════════════
   LANDSCAPE LOCK
════════════════════════════════════════════ */
#rotate-msg {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--sky);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  text-align: center;
  padding: 32px;
}

#rotate-msg .rotate-icon {
  font-size: 52px;
  animation: spin90 1.5s ease-in-out infinite alternate;
}

@keyframes spin90 {
  from { transform: rotate(0deg);   }
  to   { transform: rotate(-90deg); }
}

#rotate-msg p {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 3vw, 12px);
  color: var(--text-dim);
  line-height: 1.9;
}


/* ════════════════════════════════════════════
   DESKTOP VIEW
════════════════════════════════════════════ */
@media (hover: hover) and (pointer: fine) {

  .dpad { display: none; }

  .btn-finish { bottom: 28px; }

  .phone-frame {
    width: 390px;
    height: 844px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid var(--border);
    box-shadow: 0 0 60px rgba(167,139,250,0.15);
  }

  #room-canvas {
    width: 390px;
    height: 844px;
  }

  .intro-bg {
    width: 390px;
    height: 844px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid var(--border);
    box-shadow: 0 0 60px rgba(167,139,250,0.15);
  }

  .intro-content,
  .result-content {
    max-width: 390px;
  }
}
</style>
</head>
<body>

  <!-- ══════════════════════════════════════════
       PAGE 1: INTRO SCREEN
  ══════════════════════════════════════════ -->
  <div id="page-intro" class="page active">
    <img class="intro-bg" src="assets/intro/background.png" alt="" aria-hidden="true" />
    <div class="intro-dialog">
      <div class="dialog-titlebar">
        <span class="dialog-title">note.txt</span>
        <div class="dialog-btns">
          <span class="dialog-btn dialog-btn--min">─</span>
          <span class="dialog-btn dialog-btn--close" onclick="window.parent.navigate('home')" style="cursor:pointer;">✕</span>
        </div>
      </div>
      <div class="dialog-body">
        <p class="dialog-text" id="intro-text"></p>
        <span class="dialog-cursor" id="dialog-cursor">▌</span>
        <p class="dialog-hint hidden" id="dialog-hint">
          — click to continue —
        </p>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════
       PAGE 2: ROOM EXPLORATION
  ══════════════════════════════════════════ -->
  <div id="page-room" class="page">
    <div class="phone-frame" id="phone-frame">

      <canvas id="room-canvas"></canvas>

      <!-- Back to home button -->
      <button onclick="window.parent.navigate('home')" style="
        position:absolute; top:10px; left:10px; z-index:50;
        font-family:'Press Start 2P',monospace; font-size:7px;
        background:rgba(13,13,26,0.85); color:#e0d7ff;
        border:1px solid rgba(167,139,250,0.4); padding:6px 10px;
        cursor:pointer; letter-spacing:0.05em;
      ">✕ EXIT</button>

      <!-- HUD: top-right — pack slots + hint button -->
      <div class="hud">
        <div class="hud-top-row">

/* ─────────────────────────────────────────────

const IMAGES = {};

const IMAGE_SOURCES = {

const SPRITE = {
  frameW: 101, frameH: 150, frameCount: 4,
  frameSpeed: 2, drawH: 52, drawW: 35,
};

const DEBUG_SPRITE = false;


/* ─────────────────────────────────────────────
   IMAGE LOADER
───────────────────────────────────────────── */
function loadAllImages() {
  const promises = Object.entries(IMAGE_SOURCES).map(([key, src]) => {
    return new Promise((resolve) => {
      const img = new Image();
      img.src = src;
      img.onload  = () => { IMAGES[key] = img; resolve(); };
      img.onerror = () => {
        console.warn(`⚠️ Could not load image: ${src}`);
        IMAGES[key] = null;
        resolve();
      };
    });
  });
  return Promise.all(promises);
}

function initCanvas() {
  canvas = document.getElementById('room-canvas');
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  state.canvasW = canvas.width;
  state.canvasH = canvas.height;
}


/* ─────────────────────────────────────────────
   DRAWING
───────────────────────────────────────────── */
function drawBackground() {
  const W = state.canvasW, H = state.canvasH;

  if (IMAGES.room) {
    ctx.drawImage(IMAGES.room, 0, 0, W, H);
  } else {
    ctx.fillStyle = '#3b2d1e';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(80,55,30,0.4)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 32) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    const wallH = H * 0.45;
    ctx.fillStyle = '#2d2b55';
    ctx.fillRect(0, 0, W, wallH);
    ctx.fillStyle = '#4a3d7a';
    ctx.fillRect(0, wallH - 4, W, 8);
    drawWindow(W * 0.5 - 50, wallH * 0.1, 100, wallH * 0.6);
    drawRug(W * 0.3, H * 0.5, W * 0.4, H * 0.25);
  }

  if (DEBUG_WALLS) {
    ctx.fillStyle = 'rgba(255,50,50,0.3)';
    ctx.strokeStyle = 'rgba(255,50,50,0.8)';
    ctx.lineWidth = 2;
    WALL_ZONES.forEach(zone => {
      const zx = zone.x/100*W, zy = zone.y/100*H;
      const zw = zone.w/100*W, zh = zone.h/100*H;
      ctx.fillRect(zx, zy, zw, zh);
      ctx.strokeRect(zx, zy, zw, zh);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = '11px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(zone.label, zx + 4, zy + 14);
      ctx.fillStyle = 'rgba(255,50,50,0.3)';
    });
  }
}

function drawWindow(x, y, w, h) {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(x-4, y-4, w+8, h+8);
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, '#0d0d1a');
  grad.addColorStop(1, '#1a1a3e');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#fef9c3';
  ctx.beginPath();
  ctx.arc(x+w*0.6, y+h*0.3, 14, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#2d2b55';
  ctx.fillRect(x+w/2-2, y, 4, h);
  ctx.fillRect(x, y+h/2-2, w, 4);
  const glowGrad = ctx.createRadialGradient(x+w/2, y+h, 0, x+w/2, y+h, 120);
  glowGrad.addColorStop(0, 'rgba(254,249,195,0.12)');
  glowGrad.addColorStop(1, 'rgba(254,249,195,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(x-80, y+h, 260, 180);
}

function drawRug(x, y, w, h) {
  ctx.fillStyle = '#4c1d7a';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#6d2b99';
  ctx.fillRect(x+6, y+6, w-12, h-12);
  ctx.fillStyle = '#a855f7';
  const cx = x+w/2, cy = y+h/2;
  ctx.beginPath();
  ctx.moveTo(cx, cy-20);
  ctx.lineTo(cx+20, cy);
  ctx.lineTo(cx, cy+20);
  ctx.lineTo(cx-20, cy);
  ctx.closePath();
  ctx.fill();
}

function drawPlayer() {
  const px = state.playerX;
  const py = state.playerY;
  const drawX = px - SPRITE.drawW / 2;
  const drawY = py - SPRITE.drawH;

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(px, py + 3, SPRITE.drawW * 0.45, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  if (IMAGES.player) {
    const col  = Math.floor(state.walkFrame / SPRITE.frameSpeed) % SPRITE.frameCount;
    const row  = state.facing;
    const srcX = col * SPRITE.frameW;
    const srcY = row * SPRITE.frameH;

    ctx.drawImage(
      IMAGES.player,
      srcX, srcY, SPRITE.frameW, SPRITE.frameH,
      drawX, drawY, SPRITE.drawW, SPRITE.drawH
    );

    if (DEBUG_SPRITE) {
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(drawX, drawY, SPRITE.drawW, SPRITE.drawH);
      ctx.fillStyle = '#00ff88';
      ctx.font = '10px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`row:${row} col:${col} src:(${srcX},${srcY})`, drawX, drawY - 4);
    }
  } else {
    const size = PLAYER_SIZE;
    ctx.fillStyle = '#7c6fcd';
    ctx.fillRect(px-size/3, py-size*0.8, (size/3)*2, size*0.55);
    ctx.fillStyle = '#fcd9a0';
    ctx.fillRect(px-size/3+2, py-size*1.2, (size/3)*2-4, size*0.5);
    ctx.fillStyle = '#374151';
    ctx.fillRect(px-size/3+2, py-size*0.25, size/4, size*0.35);
    ctx.fillRect(px+2, py-size*0.25, size/4, size*0.35);

    if (DEBUG_SPRITE) {
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(px-size/2, py-size*1.5, size, size*1.5);
      ctx.fillStyle = '#ff4444';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('IMAGE NOT LOADED', px, py-size*1.5-6);
      ctx.fillText(IMAGE_SOURCES.player, px, py-size*1.5-18);
    }
  }

  if (DEBUG_SPRITE) {
    const loaded = IMAGES.player ? '✓ LOADED' : '✗ FAILED';
    const colour = IMAGES.player ? '#00ff88' : '#ff4444';
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(8, 8, 300, 54);
    ctx.fillStyle = colour;
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`player.png  ${loaded}`, 14, 24);
    ctx.fillStyle = '#ffffff';
    ctx.font = '10px monospace';
    ctx.fillText(`path: ${IMAGE_SOURCES.player}`, 14, 38);
    ctx.fillText(
      `frame: ${SPRITE.frameW}×${SPRITE.frameH}px  count:${SPRITE.frameCount}  draw:${SPRITE.drawW}×${SPRITE.drawH}`,
      14, 52
    );
  }
}

function draw() {
  ctx.clearRect(0, 0, state.canvasW, state.canvasH);
  drawBackground();
  drawDepthSorted();
  if (DEBUG_FURNITURE) drawFurnitureDebug();
  if (DEBUG_WALLS)     drawWallDebug();
}

function drawDepthSorted() {
  const W = state.canvasW, H = state.canvasH;
  const drawables = [];

  FURNITURE.forEach(furn => {
    const fx = furn.x / 100 * W;
    const fy = furn.y / 100 * H;
    const fw = furn.w / 100 * W;
    const fh = furn.h / 100 * H;
    const sortY = fy + fh;

    if (furn.img && IMAGES[furn.img]) {
      drawables.push({
        sortY,
        draw: () => ctx.drawImage(IMAGES[furn.img], fx, fy, fw, fh)
      });
    }
  });

  ITEMS.forEach(item => drawSingleItem(item));

  drawables.sort((a, b) => a.sortY - b.sortY);
  drawables.forEach(d => d.draw());
  drawPlayer();
}

function drawSingleItem(item) {
  const packed = state.packedItems.includes(item.id);
  const ix = item.rx / 100 * state.canvasW;
  const iy = item.ry / 100 * state.canvasH;

  const imgKey = `item_${item.id}`;

  const baseSize = (item.sizePct || 10) / 100 * state.canvasW;
  let drawW = baseSize;
  let drawH = baseSize;

  if (IMAGES[imgKey]) {
    const nat = IMAGES[imgKey];
    const natW = nat.naturalWidth  || nat.width  || 1;
    const natH = nat.naturalHeight || nat.height || 1;
    if (natW >= natH) {
      drawW = baseSize;
      drawH = baseSize * (natH / natW);
    } else {
      drawH = baseSize;
      drawW = baseSize * (natW / natH);
    }
  }

  if (packed) ctx.globalAlpha = 0.3;

  const glowR = Math.max(drawW, drawH) * 0.55;
  const glowColor = packed ? 'rgba(100,100,100,0.1)' : 'rgba(167,139,250,0.18)';
  const glow = ctx.createRadialGradient(ix, iy, 0, ix, iy, glowR);
  glow.addColorStop(0, glowColor);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(ix, iy, glowR, 0, Math.PI * 2);
  ctx.fill();

  if (IMAGES[imgKey]) {
    ctx.drawImage(IMAGES[imgKey], ix - drawW/2, iy - drawH/2, drawW, drawH);
  } else {
    ctx.font = `${drawH}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(item.emoji, ix, iy);
  }

  ctx.globalAlpha = 1.0;
}

function drawFurnitureDebug() {
  const W = state.canvasW, H = state.canvasH;
  FURNITURE.forEach(furn => {
    if (!furn.collision) return;
    const cx = furn.collision.x / 100 * W;
    const cy = furn.collision.y / 100 * H;
    const cw = furn.collision.w / 100 * W;
    const ch = furn.collision.h / 100 * H;
    ctx.fillStyle   = 'rgba(255,140,0,0.25)';
    ctx.strokeStyle = 'rgba(255,140,0,0.9)';
    ctx.lineWidth   = 1.5;
    ctx.fillRect(cx, cy, cw, ch);
    ctx.strokeRect(cx, cy, cw, ch);
    const sortY = (furn.y + furn.h) / 100 * H;
    ctx.strokeStyle = 'rgba(0,200,100,0.7)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(furn.x / 100 * W, sortY);
    ctx.lineTo((furn.x + furn.w) / 100 * W, sortY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(0,200,100,0.9)';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('sortY', furn.x / 100 * W + 2, sortY - 2);
  });
}

function drawWallDebug() {
  const W = state.canvasW, H = state.canvasH;
  ctx.fillStyle   = 'rgba(255,50,50,0.2)';
  ctx.strokeStyle = 'rgba(255,50,50,0.8)';
  ctx.lineWidth   = 2;
  WALL_ZONES.forEach(zone => {
    const zx = zone.x/100*W, zy = zone.y/100*H;
    const zw = zone.w/100*W, zh = zone.h/100*H;
    ctx.fillRect(zx, zy, zw, zh);
    ctx.strokeRect(zx, zy, zw, zh);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font      = '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(zone.label, zx + 4, zy + 14);
    ctx.fillStyle = 'rgba(255,50,50,0.2)';
  });
}


/* ─────────────────────────────────────────────
   SECTION 5: PLAYER MOVEMENT
───────────────────────────────────────────── */

function isMoving(dir) {
  if (dir === 'up')    return state.keys['ArrowUp']    || state.keys['w'] || state.keys['W'];
  if (dir === 'down')  return state.keys['ArrowDown']  || state.keys['s'] || state.keys['S'];
  if (dir === 'left')  return state.keys['ArrowLeft']  || state.keys['a'] || state.keys['A'];
  if (dir === 'right') return state.keys['ArrowRight'] || state.keys['d'] || state.keys['D'];
}

function updatePlayer() {
  let moved = false;
  let dx = 0, dy = 0;

  if (isMoving('up'))    { dy -= 1; state.facing = 3; moved = true; }
  if (isMoving('down'))  { dy += 1; state.facing = 0; moved = true; }
  if (isMoving('left'))  { dx -= 1; state.facing = 1; moved = true; }
  if (isMoving('right')) { dx += 1; state.facing = 2; moved = true; }

  if (dx !== 0 && dy !== 0) {
    dx *= 0.7071;
    dy *= 0.7071;
  }

  if (!moved && state.targetX !== null && state.targetY !== null) {
    const tdx = state.targetX - state.playerX;
    const tdy = state.targetY - state.playerY;
    const dist = Math.sqrt(tdx * tdx + tdy * tdy);

    if (dist > SPEED + 1) {
      dx = tdx / dist;
      dy = tdy / dist;
      moved = true;

      if (Math.abs(tdx) > Math.abs(tdy)) {
        state.facing = tdx > 0 ? 2 : 1;
      } else {
        state.facing = tdy > 0 ? 0 : 3;
      }
    } else {
      state.targetX = null;
      state.targetY = null;
    }
  }

  let newX = state.playerX + dx * SPEED;
  let newY = state.playerY + dy * SPEED;

  const margin = 16;
  newX = Math.max(margin, Math.min(state.canvasW - margin, newX));
  newY = Math.max(margin, Math.min(state.canvasH - margin, newY));

  if (!isBlocked(newX, newY)) {
    state.playerX = newX;
    state.playerY = newY;
  } else if (!isBlocked(newX, state.playerY)) {
    state.playerX = newX;
  } else if (!isBlocked(state.playerX, newY)) {
    state.playerY = newY;
  } else {
    state.targetX = null;
    state.targetY = null;
  }

  if (moved) {
    state.frameTimer++;
    if (state.frameTimer >= SPRITE.frameSpeed) {
      state.walkFrame++;
      state.frameTimer = 0;
      if (state.walkFrame >= SPRITE.frameCount * SPRITE.frameSpeed) {
        state.walkFrame = 0;
      }
    }
  } else {
    state.walkFrame  = 0;
    state.frameTimer = 0;
  }

  checkItemProximity();
}

function isInsideWall(px, py) {
  const W = state.canvasW, H = state.canvasH;
  if (!W || !H) return false;
  return WALL_ZONES.some(zone => {
    const zx = zone.x / 100 * W;
    const zy = zone.y / 100 * H;
    const zw = zone.w / 100 * W;
    const zh = zone.h / 100 * H;
    return px >= zx && px <= zx + zw && py >= zy && py <= zy + zh;
  });
}

function isInsideFurniture(px, py) {
  const W = state.canvasW, H = state.canvasH;
  if (!W || !H) return false;
  return FURNITURE.some(furn => {
    if (!furn.collision) return false;
    const cx = furn.collision.x / 100 * W;
    const cy = furn.collision.y / 100 * H;
    const cw = furn.collision.w / 100 * W;
    const ch = furn.collision.h / 100 * H;
    return px >= cx && px <= cx + cw && py >= cy && py <= cy + ch;
  });
}

function isBlocked(px, py) {
  return isInsideWall(px, py) || isInsideFurniture(px, py);
}

function checkItemProximity() {
  if (state.activeItem !== null) return;
  if (state.packedItems.length >= 4) return;

  for (const item of ITEMS) {
    if (state.packedItems.includes(item.id)) continue;

    const ix = item.rx / 100 * state.canvasW;
    const iy = item.ry / 100 * state.canvasH;
    const dx = state.playerX - ix;
    const dy = state.playerY - iy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (state.dismissedItems.includes(item.id) && dist > INTERACT_RADIUS * 1.5) {
      state.dismissedItems = state.dismissedItems.filter(id => id !== item.id);
    }

    if (state.dismissedItems.includes(item.id)) continue;

    if (dist < INTERACT_RADIUS) {
      showItemPopup(item);
      break;
    }
  }
}


/* ─────────────────────────────────────────────
   SECTION 6: ITEM INTERACTION
───────────────────────────────────────────── */

function showItemPopup(item) {
  state.activeItem = item;

  const iconEl = document.getElementById('popup-icon');
  const imgKey = `item_${item.id}`;
  if (IMAGES[imgKey]) {
    iconEl.innerHTML = '';
    const img = document.createElement('img');
    img.src   = IMAGES[imgKey].src;
    img.alt   = item.name;
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges;';
    iconEl.appendChild(img);
  } else {
    iconEl.innerHTML = item.emoji;
  }

  document.getElementById('popup-name').textContent = item.name;
  document.getElementById('popup-desc').textContent = item.secret
    ? item.desc + ' ...You almost didn\'t see it.'
    : item.desc;

  document.getElementById('item-popup').classList.remove('hidden');
}

function closePopup() {
  if (state.activeItem) {
    state.dismissedItems.push(state.activeItem.id);
  }
  state.activeItem = null;
  document.getElementById('item-popup').classList.add('hidden');
}

function packItem() {
  if (!state.activeItem) return;
  const item = state.activeItem;

  if (state.packedItems.includes(item.id)) { closePopup(); return; }

  state.packedItems.push(item.id);

  const count = state.packedItems.length;

  fillPackSlot(item, count - 1);
  refreshHintWindow();
  closePopup();

  const hints = [
    "What else can't you leave behind?",
    "3 more to go...",
    "Almost there...",
    "That's the one. What else?"
  ];
  document.getElementById('hud-hint').textContent =
    count < 4 ? hints[count - 1] || "Keep going..." : "Your bag is full.";

  if (count >= 4) {
    document.getElementById('btn-finish').classList.remove('hidden');
    document.getElementById('hud-hint').textContent =
      "You're ready. Say goodbye to this room.";
  }
}

function fillPackSlot(item, slotIndex) {
  const slot = document.getElementById(`slot-${slotIndex}`);
  if (!slot) return;

  const imgKey = `item_${item.id}`;
  if (IMAGES[imgKey]) {
    const img = document.createElement('img');
    img.src = IMAGES[imgKey].src;
    img.alt = item.name;
    slot.appendChild(img);
  } else {
    slot.textContent = item.emoji;
    slot.style.fontSize = '18px';
  }
  slot.classList.add('filled');
  slot.title = item.name;
}

function clearPackSlots() {
  for (let i = 0; i < 4; i++) {
    const slot = document.getElementById(`slot-${i}`);
    if (!slot) continue;
    slot.innerHTML = '';
    slot.classList.remove('filled');
    slot.style.fontSize = '';
    slot.title = '';
  }
}

function toggleHintWindow() {
  const win = document.getElementById('hint-window');
  if (win.classList.contains('hidden')) {
    refreshHintWindow();
    win.classList.remove('hidden');
  } else {
    win.classList.add('hidden');
  }
}

function refreshHintWindow() {
  const body = document.getElementById('hint-body');
  if (!body) return;
  body.innerHTML = '';

  ITEMS.forEach(item => {
    const isPacked = state.packedItems.includes(item.id);

    const row = document.createElement('div');
    row.className = 'hint-item' + (isPacked ? ' packed' : '');

    const imgKey = `item_${item.id}`;
    if (IMAGES[imgKey]) {
      const img = document.createElement('img');
      img.src = IMAGES[imgKey].src;
      img.alt = item.name;
      img.className = 'hint-item-icon';
      row.appendChild(img);
    } else {
      const em = document.createElement('span');
      em.textContent = item.emoji;
      em.style.fontSize = '14px';
      row.appendChild(em);
    }

    const label = document.createElement('span');
    label.textContent = item.name + (isPacked ? ' ✓' : '');
    row.appendChild(label);

    body.appendChild(row);
  });
}


/* ─────────────────────────────────────────────
   SECTION 7: ARCHETYPE SCORING
───────────────────────────────────────────── */

function calculateArchetype() {
  const tagCounts = {};

  state.packedItems.forEach(id => {
    const item = ITEMS.find(i => i.id === id);
    if (!item) return;
    tagCounts[item.tag] = (tagCounts[item.tag] || 0) + 1;
  });

  if (tagCounts['secret']) {
    return ARCHETYPES.find(a => a.id === 'moonwalker');
  }

  let topTag = null, topCount = 0;
  for (const [tag, count] of Object.entries(tagCounts)) {
    if (count > topCount) {
      topCount = count;
      topTag = tag;
    }
  }

  const match = ARCHETYPES.find(a => a.tags.includes(topTag));
  return match || ARCHETYPES[0];
}


/* ─────────────────────────────────────────────
   SECTION 8: GAME FLOW
───────────────────────────────────────────── */

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

const INTRO_LINES = [
  "I'm leaving to Lune",
  "in a few hours...",
  "",
  "but I haven't packed",
  "my bag yet.",
  "",
  "I need to hurry.",
];

const TYPING_SPEED_MS = 45;

function initIntro() {
  const textEl   = document.getElementById('intro-text');
  const cursorEl = document.getElementById('dialog-cursor');
  const hintEl   = document.getElementById('dialog-hint');

  if (!textEl) return;

  const fullText = INTRO_LINES.join('\n');
  let charIndex  = 0;
  let skipToEnd  = false;

  const skipHandler = () => { skipToEnd = true; };
  document.getElementById('page-intro')
    .addEventListener('click', skipHandler, { once: true });

  function typeNextChar() {
    if (skipToEnd) {
      const remaining = fullText.slice(charIndex);
      textEl.innerHTML += remaining.replace(/\n/g, '<br>');
      charIndex = fullText.length;
      onTypingDone();
      return;
    }

    if (charIndex >= fullText.length) {
      onTypingDone();
      return;
    }

    const char = fullText[charIndex];
    charIndex++;

    if (char === '\n') {
      textEl.innerHTML += '<br>';
    } else {
      textEl.innerHTML += char === '<' ? '&lt;' : char === '>' ? '&gt;' : char;
    }

    const pause = '.…!?'.includes(char) ? TYPING_SPEED_MS * 6 : TYPING_SPEED_MS;
    setTimeout(typeNextChar, pause);
  }

  function onTypingDone() {
    document.getElementById('page-intro')
      .removeEventListener('click', skipHandler);
    hintEl.classList.remove('hidden');
    document.getElementById('page-intro')
      .addEventListener('click', startGame, { once: true });
  }

  setTimeout(typeNextChar, 400);
}

function startGame() {
  showPage('page-room');
  initCanvas();
  setupInput();
  setupDpad();

  state.playerX = state.canvasW / 2;
  state.playerY = state.canvasH * 0.7;

  state.packedItems    = [];
  state.dismissedItems = [];
  state.activeItem     = null;
  clearPackSlots();
  document.getElementById('hint-window')?.classList.add('hidden');
  document.getElementById('btn-finish').classList.add('hidden');
  document.getElementById('hud-hint').textContent = 'Loading assets...';

  loadAllImages().then(() => {
    document.getElementById('hud-hint').textContent = 'Choose what matters most to you.';
    if (state.loopId) cancelAnimationFrame(state.loopId);
    gameLoop();
  });
}

function gameLoop() {
  updatePlayer();
  draw();
  state.loopId = requestAnimationFrame(gameLoop);
}

function finishPacking() {
  cancelAnimationFrame(state.loopId);

  const archetype = calculateArchetype();

  const grid = document.getElementById('chosen-items');
  grid.innerHTML = '';
  state.packedItems.forEach(id => {
    const item = ITEMS.find(i => i.id === id);
    if (!item) return;

    const tile = document.createElement('div');
    tile.className = 'pack-tile';

    const imgKey = `item_${item.id}`;
    if (IMAGES[imgKey]) {
      const img = document.createElement('img');
      img.src = IMAGES[imgKey].src;
      img.alt = item.name;
      img.className = 'pack-tile-img';
      tile.appendChild(img);
    } else {
      const em = document.createElement('span');
      em.className = 'pack-tile-emoji';
      em.textContent = item.emoji;
      tile.appendChild(em);
    }

    const label = document.createElement('span');
    label.className = 'pack-tile-label';
    label.textContent = item.name;

    tile.appendChild(label);

    grid.appendChild(tile);
  });

  showPage('page-result');
  generateStars('stars2');
}

function restartGame() {
  state.packedItems    = [];
  state.dismissedItems = [];
  state.activeItem     = null;
  clearPackSlots();
  document.getElementById('hint-window')?.classList.add('hidden');

  const textEl = document.getElementById('intro-text');
  const hintEl = document.getElementById('dialog-hint');
  if (textEl) textEl.innerHTML = '';
  if (hintEl) hintEl.classList.add('hidden');

  showPage('page-intro');
  initIntro();
}


/* ─────────────────────────────────────────────
   SECTION 9: KEYBOARD & TOUCH INPUT
───────────────────────────────────────────── */

function setupInput() {
  document.addEventListener('keydown', e => {
    state.keys[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
      e.preventDefault();
    }
    if (e.key === 'Escape') closePopup();
  });

  document.addEventListener('keyup', e => {
    state.keys[e.key] = false;
  });

  canvas.addEventListener('pointerdown', e => {
    if (state.activeItem !== null) return;

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    state.targetX = (e.clientX - rect.left) * scaleX;
    state.targetY = (e.clientY - rect.top)  * scaleY;
  });
}

function setupDpad() {
  // D-pad hidden on mobile — click-to-walk used instead
}


/* ─────────────────────────────────────────────
   SECTION 10: INSTAGRAM STORY CARD GENERATOR
───────────────────────────────────────────── */

function downloadStoryCard() {
  const shareCanvas = document.getElementById('share-canvas');
  const sc = shareCanvas.getContext('2d');
  sc.imageSmoothingEnabled = false;
  const W = 1080, H = 1920;

  // Draw result background image (same as result page)
  if (IMAGES.result_bg) {
    // Scale the background to fill the full story card canvas
    sc.drawImage(IMAGES.result_bg, 0, 0, W, H);
  } else {
    // Fallback: solid dark background if image didn't load
    const bg = sc.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0,   '#0d0d1a');
    bg.addColorStop(0.4, '#1a1050');
    bg.addColorStop(1,   '#0d0d1a');
    sc.fillStyle = bg;
    sc.fillRect(0, 0, W, H);
  }

  const boxX = 180, boxY = 560, boxW = 720, boxH = 760;
  const tbarH = 70;

  sc.fillStyle = '#edf1ef';
  sc.fillRect(boxX, boxY, boxW, boxH);
  sc.strokeStyle = '#6b7280';
  sc.lineWidth = 6;
  sc.strokeRect(boxX, boxY, boxW, boxH);

  sc.fillStyle = '#969eb5';
  sc.fillRect(boxX, boxY, boxW, tbarH);

  sc.fillStyle = '#f0f0f0';
  sc.font = 'bold 32px "Courier New", monospace';
  sc.textAlign = 'left';
  sc.fillText('PACKING', boxX + 24, boxY + 44);

  const btnSize = 44;
  const btnY = boxY + (tbarH - btnSize) / 2;
  ['─','□','✕'].forEach((label, i) => {
    const bx = boxX + boxW - (3 - i) * (btnSize + 6) - 10;
    sc.fillStyle = '#9b9fb8';
    sc.fillRect(bx, btnY, btnSize, btnSize);
    sc.strokeStyle = '#1a1a1a';
    sc.lineWidth = 2;
    sc.strokeRect(bx, btnY, btnSize, btnSize);
    sc.fillStyle = '#1a1a1a';
    sc.font = '20px "Courier New", monospace';
    sc.textAlign = 'center';
    sc.fillText(label, bx + btnSize/2, btnY + btnSize/2 + 7);
  });

  const padding = 40;
  const gridX = boxX + padding;
  const gridY = boxY + tbarH + padding;
  const gridW = boxW - padding * 2;
  const gridH = boxH - tbarH - padding * 2;
  const cellW = (gridW - padding) / 2;
  const cellH = (gridH - padding) / 2;

  state.packedItems.forEach((id, idx) => {
    const item = ITEMS.find(i => i.id === id);
    if (!item) return;

    const col = idx % 2;
    const row = Math.floor(idx / 2);
    const cx = gridX + col * (cellW + padding);
    const cy = gridY + row * (cellH + padding);

    sc.fillStyle = '#d5d7e7';
    sc.fillRect(cx, cy, cellW, cellH);
    sc.strokeStyle = '#1a1a1a';
    sc.lineWidth = 4;
    sc.strokeRect(cx, cy, cellW, cellH);

    const imgKey = `item_${item.id}`;
    if (IMAGES[imgKey]) {
      const iw = IMAGES[imgKey].naturalWidth  || IMAGES[imgKey].width;
      const ih = IMAGES[imgKey].naturalHeight || IMAGES[imgKey].height;
      const maxS = Math.min(cellW, cellH) * 0.65;
      let dw, dh;
      if (iw >= ih) { dw = maxS; dh = maxS * (ih/iw); }
      else           { dh = maxS; dw = maxS * (iw/ih); }
      sc.drawImage(IMAGES[imgKey],
        cx + (cellW - dw)/2,
        cy + (cellH - dh)/2 - 20,
        dw, dh);
    }

    sc.fillStyle = '#2a2a3a';
    sc.font = 'bold 22px "Courier New", monospace';
    sc.textAlign = 'center';
    sc.fillText(item.name, cx + cellW/2, cy + cellH - 20);
  });

  sc.fillStyle = '#a09cbb';
  sc.font = '32px "Press Start 2P", monospace';
  sc.textAlign = 'center';
  sc.fillText('CONYCORN team', W/2, H - 50);

  const link = document.createElement('a');
  link.download = 'pack-for-lune.png';
  link.href = shareCanvas.toDataURL('image/png');
  link.click();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let currentY = y;

  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics  = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line, x, currentY);
      line = words[n] + ' ';
      currentY += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, currentY);
}


/* ─────────────────────────────────────────────
   SECTION 11: DECORATIVE EFFECTS
───────────────────────────────────────────── */

function generateStars(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.cssText = `
      left:  ${Math.random() * 100}%;
      top:   ${Math.random() * 100}%;
      width: ${Math.random() * 3 + 1}px;
      height: ${Math.random() * 3 + 1}px;
      --dur:   ${Math.random() * 3 + 2}s;
      --delay: ${Math.random() * 4}s;
    `;
    container.appendChild(star);
  }
}

───────────────────────────────────────────── */

initIntro();

function checkOrientation() {
  const rotateMsg = document.getElementById('rotate-msg');
  if (!rotateMsg) return;

  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  const isLandscape    = window.innerWidth > window.innerHeight;

  if (isTouchDevice && isLandscape) {
    rotateMsg.style.display = 'flex';
  } else {
    rotateMsg.style.display = 'none';
  }
}

checkOrientation();
window.addEventListener('resize',            checkOrientation);
window.addEventListener('orientationchange', checkOrientation);
